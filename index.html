<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RutaAR</title>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

#titulo{
position:absolute;
top:20px;
width:100%;
font-size:30px;
z-index:2;
}
</style>

</head>

<body>

<div id="titulo">
RutaAR - Escanea el cartel turístico
</div>

<a-scene
mindar-image="imageTargetSrc: targets.mind;"
color-space="sRGB"
renderer="colorManagement: true, physicallyCorrectLights"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: true"
>

<a-assets>
<img id="fotoLugar" src="https://upload.wikimedia.org/wikipedia/commons/6/6e/San_Francisco_Plaza.jpg">
</a-assets>

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<a-entity mindar-image-target="targetIndex: 0">
<a-image src="#fotoLugar" position="0 0 0" height="1" width="1"></a-image>
<a-text value="Lugar turistico" position="0 -0.7 0" align="center"></a-text>
</a-entity>

</a-scene>

</body>
</html>
